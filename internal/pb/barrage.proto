syntax = "proto3";

package barrage;

// 生成 Go 代码后的包路径
option go_package = "barrage/internal/pb";

// 操作类型定义
enum OpType {
  // 未知操作
  OP_UNKNOWN = 0;

  // 加入房间
  OP_JOIN_ROOM = 1;

  // 客户端发送聊天消息
  OP_CHAT = 2;

  // 心跳消息
  OP_HEARTBEAT = 3;

  // 服务端广播消息
  OP_BROADCAST = 4;

  // 服务端返回错误
  OP_ERROR = 5;

  // 系统消息 / 公告
  OP_SYSTEM = 6;
}

// 系统下发的公告或事件通知
message SystemMsg {
  // 消息内容
  string content = 1;

  // 消息类型（如 1: 公告，2: 房间通知，3: 系统事件等）
  int32 type = 2;
}

// 服务端下发的错误消息
message ErrorMsg {
  // 错误码
  int32 code = 1;

  // 错误信息描述
  string message = 2;
}

// WebSocket 二进制帧中的统一外层协议
message Frame {
  // 当前消息操作类型
  OpType op = 1;

  // 房间 ID
  int64 room_id = 2;

  // 用户 ID
  int64 user_id = 3;

  // 具体业务负载，里面再嵌套不同消息体
  bytes payload = 4;

  // 毫秒时间戳
  int64 timestamp = 5;
}

// 加入房间请求
message JoinRoomReq {
  // 房间 ID
  int64 room_id = 1;

  // 用户 ID
  int64 user_id = 2;

  // 是否为付费用户
  bool is_premium = 3;

  // 鉴权 token
  string token = 4;
}

// 聊天消息体
message ChatMsg {
  // 弹幕文本内容
  string content = 1;
}

// 广播消息体
message BroadcastMsg {
  // 房间 ID
  int64 room_id = 1;

  // 发送者用户 ID
  int64 user_id = 2;

  // 发送内容
  bytes body = 3;

  // 毫秒时间戳
  int64 timestamp = 4;
}

// Kafka 广播链路中的统一消息体
message BroadcastEnvelope {
  // 消息类型：0=弹幕(不重试), 1=礼物(重试), 2=道具(重试), 3=彩色弹幕(重试)
  int32 msg_type = 8;

  // 幂等key，用于特殊消息去重 (格式: userId_roomId_timestamp_random)
  string idempotency_key = 9;

  // 房间 ID
  int64 room_id = 1;

  // 发送者用户 ID
  int64 user_id = 2;

  // 发送者连接 ID
  string sender_conn_id = 3;

  // 是否为付费用户
  bool is_premium = 4;

  // 最终可直接下发给客户端的 protobuf 二进制负载
  bytes payload = 5;

  // 毫秒时间戳
  int64 timestamp = 6;

  // 视频时间戳 (毫秒) - 弹幕对应的视频时刻，用于弹幕和视频同步
  int64 video_ts = 7;
}

// 视频时间戳更新 (用于视频同步)
message VideoTSUpdate {
  // 房间 ID
  int64 room_id = 1;

  // 当前视频时间戳 (毫秒)
  int64 video_ts = 2;

  // 墙钟发送时间 (毫秒)
  int64 sent_at = 3;
}

// 心跳消息
message Heartbeat {
  // 客户端时间戳
  int64 client_ts = 1;
}
