syntax = "proto3";

package barrage;

// 生成 Go 代码后的包路径
option go_package = "barrage/internal/pb";

// 操作类型定义
enum OpType {
  // 未知操作
  OP_UNKNOWN = 0;

  // 加入房间
  OP_JOIN_ROOM = 1;

  // 客户端发送聊天消息
  OP_CHAT = 2;

  // 心跳消息
  OP_HEARTBEAT = 3;

  // 服务端广播消息
  OP_BROADCAST = 4;
}

// WebSocket 二进制帧中的统一外层协议
message Frame {
  // 当前消息操作类型
  OpType op = 1;

  // 房间 ID
  int64 room_id = 2;

  // 用户 ID
  int64 user_id = 3;

  // 具体业务负载，里面再嵌套不同消息体
  bytes payload = 4;

  // 毫秒时间戳
  int64 timestamp = 5;
}

// 加入房间请求
message JoinRoomReq {
  // 房间 ID
  int64 room_id = 1;

  // 用户 ID
  int64 user_id = 2;

  // 是否为付费用户
  bool is_premium = 3;
}

// 聊天消息体
message ChatMsg {
  // 弹幕文本内容
  string content = 1;
}

// 广播消息体
message BroadcastMsg {
  // 房间 ID
  int64 room_id = 1;

  // 发送者用户 ID
  int64 user_id = 2;

  // 发送内容
  bytes body = 3;

  // 毫秒时间戳
  int64 timestamp = 4;
}

// Kafka 广播链路中的统一消息体
message BroadcastEnvelope {
  // 房间 ID
  int64 room_id = 1;

  // 发送者用户 ID
  int64 user_id = 2;

  // 发送者连接 ID
  string sender_conn_id = 3;

  // 是否为付费用户
  bool is_premium = 4;

  // 最终可直接下发给客户端的 protobuf 二进制负载
  bytes payload = 5;

  // 毫秒时间戳
  int64 timestamp = 6;
}

// 心跳消息
message Heartbeat {
  // 客户端时间戳
  int64 client_ts = 1;
}
