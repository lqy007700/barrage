server:
  addr: "0.0.0.0"
  port: 8080

kafka:
  brokers:
    - "localhost:9092"
  topic: "barrage-danmaku"
  write_timeout_sec: 5

filter:
  path: "./configs/sensitive_words.txt"

# 热点检测配置
hot:
  super_threshold: 20000   # 超级热点阈值 (连接数)
  hot_threshold: 5000     # 热点阈值
  warm_threshold: 1000    # 温热阈值
  cleanup_interval_sec: 300

# 采样配置
sampler:
  super_sample_rate: 0.05  # 超级热点: 5%保留
  hot_sample_rate: 0.10    # 热点: 10%保留
  warm_sample_rate: 0.30    # 温热: 30%保留
